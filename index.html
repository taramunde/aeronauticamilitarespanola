<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilitaryFactory España | Aeronáutica Militar Española</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Aeronáutica Militar Española</h1>
            <p>Flota del Ejército del Aire y del Espacio</p>
        </header>

        <!-- Barra de filtros y búsqueda -->
        <div class="filters">
            <input type="text" id="search" placeholder="🔍 Buscar aeronave...">
            <select id="typeFilter">
                <option value="all">Todos los tipos</option>
                <option value="Caza">Caza</option>
                <option value="Transporte">Transporte</option>
                <option value="Helicóptero">Helicóptero</option>
                <option value="Entrenamiento">Entrenamiento</option>
            </select>
            <button id="addBtn">+ Añadir aeronave</button>
        </div>

        <!-- Contenedor para las tarjetas de aeronaves -->
        <div id="aircraftList" class="aircraft-grid"></div>
    </div>

    <!-- Modal para añadir/quitar datos -->
    <div id="modal" class="modal">
        <!-- ... contenido del modal ... -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
