<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejército del Aire y del Espacio | España 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css?nocache=20251231v19">
</head>
<body class="tail-container bg-zinc-950 text-zinc-100 overflow-x-hidden">

    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-zinc-950 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6">
            <div class="h-16 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-2xl border-2 border-yellow-400">🇪🇸</div>
                    <div>
                        <span class="font-bold text-2xl tracking-tighter">EAE</span>
                        <span class="block text-[10px] leading-none -mt-1 text-amber-400">EJÉRCITO DEL AIRE Y DEL ESPACIO</span>
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                    <a href="#inicio" onclick="smoothScrollTo('inicio', event)" class="hover:text-red-500 transition-colors">INICIO</a>
                    <a href="#flota" onclick="smoothScrollTo('flota', event)" class="hover:text-red-500 transition-colors">FLOTA</a>
                </div>

                <button id="hamburger" onclick="toggleMobileMenu()" class="md:hidden w-10 h-10 flex items-center justify-center text-2xl hover:text-red-500">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex flex-col gap-4">
            <a href="#inicio" onclick="smoothScrollTo('inicio', event)" class="hover:text-red-500 font-medium">INICIO</a>
            <a href="#flota" onclick="smoothScrollTo('flota', event)" class="hover:text-red-500 font-medium">FLOTA</a>
        </div>
    </nav>

    <section id="inicio" class="hero-bg h-screen flex items-center relative">
        <div class="max-w-5xl mx-auto px-6 text-center z-10 w-full mt-16">
            <h1 class="text-5xl md:text-7xl font-bold leading-tight tracking-tighter mb-6">EJÉRCITO DEL AIRE<br>Y DEL ESPACIO</h1>
            <p class="max-w-lg mx-auto text-xl text-zinc-300 mb-10">Defendiendo España 2026</p>
            <button onclick="smoothScrollTo('flota', event)" class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-3xl text-lg font-semibold flex items-center gap-x-3 mx-auto transition-transform hover:scale-105">
                EXPLORAR FLOTA <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </section>

    <section id="flota" class="py-24 bg-black min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                <div>
                    <h2 class="text-5xl font-bold tracking-tighter">Flota 2026</h2>
                    <p id="results-count" class="text-zinc-400 mt-2 text-sm font-mono"></p> </div>
                
                <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                    <input id="search-input" 
                           onkeyup="filterFleet()" 
                           type="text" 
                           placeholder="Buscar aeronave..." 
                           class="bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-3 focus:outline-none focus:border-red-600 w-full md:w-64 transition-colors">
                    
                    <div class="flex gap-2 overflow-x-auto pb-2 sm:pb-0">
                        <button onclick="filterByType('all', this)" class="filter-btn active px-4 py-2 rounded-2xl text-sm font-medium whitespace-nowrap">TODOS</button>
                        <button onclick="filterByType('caza', this)" class="filter-btn px-4 py-2 rounded-2xl text-sm font-medium whitespace-nowrap">CAZA</button>
                        <button onclick="filterByType('transporte', this)" class="filter-btn px-4 py-2 rounded-2xl text-sm font-medium whitespace-nowrap">TRANSPORTE</button>
                        <button onclick="filterByType('helicoptero', this)" class="filter-btn px-4 py-2 rounded-2xl text-sm font-medium whitespace-nowrap">HELICÓPTERO</button>
                    </div>
                </div>
            </div>

            <div id="fleet-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <div id="aircraft-modal" class="hidden fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4 transition-opacity" onclick="closeModalOnOutsideClick(event)">
        <div class="max-w-4xl w-full bg-zinc-900 rounded-3xl overflow-hidden max-h-[90vh] flex flex-col shadow-2xl shadow-red-900/20">
            <div class="flex justify-between items-center border-b border-zinc-700 px-6 py-4">
                <div>
                    <div id="modal-title" class="text-2xl font-bold"></div>
                    <div id="modal-subtitle" class="text-red-500 font-mono text-sm mt-1"></div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white transition-colors">&times;</button>
            </div>
            <div class="flex border-b border-zinc-700 px-6 overflow-x-auto hide-scrollbar">
                <button onclick="switchTab(0)" class="tab-btn active px-4 py-3 whitespace-nowrap">General</button>
                <button onclick="switchTab(1)" class="tab-btn px-4 py-3 whitespace-nowrap">Especificaciones</button>
                <button onclick="switchTab(2)" class="tab-btn px-4 py-3 whitespace-nowrap">En España</button>
            </div>
            <div id="modal-content" class="flex-1 overflow-auto p-6 text-zinc-300"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
